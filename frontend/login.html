<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeScope — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Login-specific overrides ── */
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 0 1.5rem;
      animation: slideUp 0.6s var(--ease) both;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent-gradient);
    }

    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--fg);
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .login-logo span { color: var(--accent); }

    .login-sub {
      font-size: 0.8rem;
      color: var(--fg-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      font-weight: 500;
    }

    .demo-badge {
      background: rgba(255,183,0,0.1);
      border: 1px solid rgba(255,183,0,0.3);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      margin-bottom: 2rem;
      font-size: 0.78rem;
      color: #e6a800;
      line-height: 1.6;
    }

    .demo-badge strong { display: block; margin-bottom: 0.25rem; color: #ffb700; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Background grid -->
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">Trade<span>Scope</span></div>
      <div class="login-sub">India Market Intelligence</div>

      <div class="demo-badge">
        <strong>⚡ Demo Credentials</strong>
        admin / password123 &nbsp;·&nbsp; demo / demo1234
      </div>

      <div id="login-error" class="alert alert-error" style="display:none"></div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          id="username"
          type="text"
          class="form-input"
          placeholder="Enter username"
          autocomplete="username"
          autofocus
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          placeholder="Enter password"
          autocomplete="current-password"
        />
      </div>

      <button id="login-btn" class="btn btn-primary btn-full">
        <span id="btn-text">Sign In</span>
        <span id="btn-spinner" class="spinner" style="display:none"></span>
      </button>
    </div>
  </div>

  <script>
    // ── Login Logic ────────────────────────────────────────────────────────────
    const API_BASE = '';   // same origin

    function setLoading(loading) {
      document.getElementById('btn-text').style.display    = loading ? 'none' : 'inline';
      document.getElementById('btn-spinner').style.display = loading ? 'inline-block' : 'none';
      document.getElementById('login-btn').disabled        = loading;
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      document.getElementById('login-error').style.display = 'none';

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Login failed. Please try again.');
          return;
        }

        // Store token with expiry
        const expiry = Date.now() + data.expires_in * 1000;
        sessionStorage.setItem('token',       data.access_token);
        sessionStorage.setItem('tokenExpiry', expiry);
        sessionStorage.setItem('username',    username);

        window.location.href = 'index.html';

      } catch (err) {
        showError('Network error — is the backend running?');
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    // Submit on Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
    document.getElementById('login-btn').addEventListener('click', doLogin);

    // Redirect if already logged in
    if (sessionStorage.getItem('token') && Date.now() < +sessionStorage.getItem('tokenExpiry')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
